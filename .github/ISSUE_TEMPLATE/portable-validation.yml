name: Portable artifact validation
description: Report a clean install, update, launch, or generation result for a Cubric Studio Vision portable artifact.
title: "[validation]: "
labels:
  - validation
body:
  - type: markdown
    attributes:
      value: |
        Use this for platform validation reports. Please include the exact artifact and enough local details for maintainers to judge support language honestly.
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - Linux
        - macOS
    validations:
      required: true
  - type: input
    id: os_version
    attributes:
      label: OS version
      placeholder: "Windows 11 23H2, Ubuntu 24.04, macOS 14.5"
    validations:
      required: true
  - type: input
    id: arch
    attributes:
      label: CPU architecture
      placeholder: "x64, arm64"
    validations:
      required: true
  - type: input
    id: gpu
    attributes:
      label: GPU and driver stack
      placeholder: "RTX 4070 / NVIDIA 555.85, AMD iGPU / Mesa 24.x, Apple M-series"
    validations:
      required: true
  - type: input
    id: artifact_name
    attributes:
      label: Artifact name
      placeholder: "CubricVision-windows-x64-v0.0.1.zip"
    validations:
      required: true
  - type: dropdown
    id: validation_path
    attributes:
      label: Clean install or update path
      options:
        - Clean extract and first launch
        - update-from-zip on an existing portable folder
        - GitHub update script on an existing portable folder
    validations:
      required: true
  - type: textarea
    id: results
    attributes:
      label: Validation results
      description: Include launcher result, resolved portable paths if visible, engine setup or repair result, model detection, and whether generation was tested.
      placeholder: |
        Launcher:
        Engine setup:
        Model detection:
        Generation:
        Folder open / media checks:
    validations:
      required: true
  - type: textarea
    id: app_log_tail
    attributes:
      label: App log tail
      description: Paste the last relevant lines from the app log after launch, validation, or failure.
      render: text
    validations:
      required: true
  - type: textarea
    id: macos_gatekeeper
    attributes:
      label: macOS Gatekeeper notes, if applicable
      description: For macOS, describe Gatekeeper prompts and whether launch was tested through Finder, Terminal, or both.
      render: text
    validations:
      required: false
