name: Bug report
description: Report a reproducible Cubric Vision problem.
title: "[bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this for app bugs. Do not include secrets, tokens, private model URLs, or sensitive user data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - Linux
        - macOS
    validations:
      required: true
  - type: input
    id: os_version
    attributes:
      label: OS version
      placeholder: "Windows 11 23H2, Ubuntu 24.04, macOS 14.5"
    validations:
      required: true
  - type: input
    id: app_version
    attributes:
      label: App version or commit
      placeholder: "v0.0.4 or commit SHA"
    validations:
      required: true
  - type: input
    id: gpu
    attributes:
      label: GPU and driver stack
      placeholder: "RTX 4070 / NVIDIA 555.85, AMD iGPU / Mesa 24.x, Apple M-series"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant app log tail
      description: Paste only the relevant ending lines from the app log.
      render: text
    validations:
      required: false
  - type: textarea
    id: media
    attributes:
      label: Screenshots or recordings
      description: Add screenshots, recordings, or generated output examples if they help explain the bug.
    validations:
      required: false
