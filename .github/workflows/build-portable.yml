name: Request portable artifacts

# Artifact builds run in the private mpi-ci repository so early-access
# artifacts are not exposed on public Cubric-Vision Actions runs.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build
        required: true
        default: master
        type: string
      version:
        description: Release version override
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  request-private-build:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch private mpi-ci build
        env:
          GH_TOKEN: ${{ secrets.MPI_CI_WORKFLOW_TOKEN }}
          SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Missing secret MPI_CI_WORKFLOW_TOKEN. Add a fine-grained token that can dispatch workflows in MadPonyInteractive/mpi-ci."
            exit 1
          fi

          args=(
            workflow run cubric-vision-portable.yml
            --repo MadPonyInteractive/mpi-ci
            --ref main
            -f source_repo=MadPonyInteractive/Cubric-Vision
            -f ref="$SOURCE_REF"
          )

          if [ -n "$VERSION" ]; then
            args+=(-f version="$VERSION")
          fi

          gh "${args[@]}"
          echo "Private portable build requested in MadPonyInteractive/mpi-ci for $SOURCE_REF."
