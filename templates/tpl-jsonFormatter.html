<template id="tpl-jsonFormatter">
  <div class="tool-panel" id="tool-jsonFormatter">
    <div class="tool-header">
      <div class="tool-header-text">
        <h2 class="tool-title">JSON Formatter</h2>
        <p class="tool-desc">Convert text to structured JSON objects.</p>
      </div>
    </div>
    <div class="tool-body gen-flow-container">
      <div id="json-loading" class="loading-state hide">
        <div class="spinner"></div>
        <p>Formatting…</p>
      </div>
      <div class="result-section hide" id="json-result">
        <div class="form-group full-width">
          <div class="prompt-box-wrapper result-viewer" style="position: relative; background: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 12px;">
            <textarea id="json-output" class="result-edit-area json-output" rows="12" readonly
              style="border: none; padding: 1rem; width: 100%; box-shadow: none; font-family: monospace;"></textarea>
            <div id="json-copy-slot" style="position: absolute; top: 8px; right: 8px;"></div>
          </div>
        </div>
        <div id="json-actions" class="step-actions" style="justify-content: flex-end;">
          <div id="json-toGenerator-slot"></div>
        </div>
      </div>
    </div>

  </div>
  <!-- Floating Fixed Prompt Box -->
  <div id="jsonPromptGroup" class="gen-prompt-fixed">
    <div id="json-prompt-wrapper" style="width: 100%;"></div>
  </div>
</template>
