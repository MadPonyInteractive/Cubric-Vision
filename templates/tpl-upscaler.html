<template id="tpl-upscaler">
  <div class="tool-panel" id="tool-upscaler">
    <div class="tool-header">
      <div>
        <h2 class="tool-title">Upscaler</h2>
        <p class="tool-desc">AI-powered image upscaling with grid-based creative refinement.</p>
      </div>
      <!-- Model selector injected here by shell.js -->
    </div>

    <div class="tool-body detailer-layout">
      <!-- Left: Source Image Pane (Matching Detailer) -->
      <div class="detailer-source-pane">
        <div class="detailer-card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
            <div class="section-label" style="margin-bottom: 0;">Source Image</div>

            <!-- Transfer Button (Arrow) moved next to label -->
            <button id="upscaler-transferBtn" class="detailer-transfer-btn hide" title="Transfer Result to Source">
              <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
              </svg>
            </button>
          </div>

          <div id="upscaler-sourcePreview" class="detailer-source-preview"
            style="min-height: 200px; display: flex; flex-direction: column; height: auto;">
            <div id="upscaler-emptyState" class="detailer-empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <polyline points="21 15 16 10 5 21" />
              </svg>
              <p>Drag & Drop<br>or Use <b>+</b> Icon</p>
            </div>
            <div id="upscaler-sourceContainer" class="detailer-canvas-container" style="height: 100%;">
              <!-- Interactive Canvas injected here -->
            </div>
            <div id="upscaler-imageSizeFeedback" class="image-size-feedback hide"></div>
          </div>
        </div>
      </div>

      <!-- Right: Processed Results / Comparison -->
      <div class="detailer-canvas-pane">
        <div id="upscaler-canvasContainer" class="detailer-canvas-container">
          <!-- Result Canvas / Comparison Tool -->
        </div>
      </div>
    </div>

    <!-- Floating Fixed Prompt Box (Upscaler Version) -->
    <div id="upscalerPromptGroup" class="gen-prompt-fixed">
      <div id="upscaler-prompt-wrapper" style="width: 100%;"></div>

      <div class="comfy-progress-wrapper hide" id="upscaler-progressWrapper"
        style="margin: 0.25rem 0.5rem; height: 3px; border-radius: 4px;">
        <div class="comfy-progress-fill" id="upscaler-progressBar"></div>
      </div>

      <div class="prompt-box-actions-bar">
        <div style="display: flex; gap: 0.75rem; align-items: center;">
          <!-- Media Gallery -->
          <button id="upscaler-addAssetBtn" class="btn secondary small icon-only" title="Add Media"
            style="border-radius: 50%; width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05);">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
            </svg>
          </button>

          <!-- Positive/Negative Toggle -->
          <div id="upscaler-prompt-toggle-container"></div>

          <!-- Upscale Factor -->
          <div class="mpi-control-group" title="Upscale Factor"
            style="padding: 4px; width: 44px; justify-content: center;">
            <input type="number" id="upscaler-factor" min="1.0" max="4.0" step="0.5" value="1.5" class="mpi-number-lite"
              style="width: 28px;">
          </div>

          <!-- Denoise Slider -->
          <div id="upscaler-denoiseGroup" class="mpi-control-group" title="Denoise Power" style="pointer-events: auto;">
            <input type="range" id="upscaler-denoise" min="0.1" max="1.0" step="0.01" value="0.3"
              style="width:80px; cursor: pointer; pointer-events: auto;">
            <span id="upscaler-denoiseValue"
              style="font-size:0.75rem; color:var(--primary); width:30px; font-weight:700;">0.60</span>
          </div>

          <!-- New Seed -->
          <button id="upscaler-newSeedBtn" class="btn secondary small icon-only" title="Generate New Seed"
            style="border-radius: var(--radius-sm); width: 28px; height: 28px; padding: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05);">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round">
              <path d="M9 3c0 4.5 6 4.5 6 9s-6 4.5-6 9" />
              <path d="M15 3c0 4.5-6 4.5-6 9s6 4.5 6 9" />
              <path d="M10 6h4" />
              <path d="M10 18h4" />
              <path d="M11 12h2" />
            </svg>
          </button>

          <div style="width: 0.25rem;"></div>

          <!-- Grid Control Group -->
          <div id="upscaler-gridGroup" class="mpi-control-group"
            style="padding: 0.25rem 0.5rem; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
            <button id="upscaler-autoGridToggle" class="btn secondary small icon-only" title="Toggle Auto Grid"
              style="border-radius: 4px; width: 24px; height: 24px; padding: 0; background: var(--primary); color: white;">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                <path
                  d="M20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM8 20H4v-4h4v4zm0-6H4v-4h4v4zm0-6H4V4h4v4zm6 12h-4v-4h4v4zm0-6h-4v-4h4v4zm0-6h-4V4h4v4zm6 12h-4v-4h4v4zm0-6h-4v-4h4v4zm0-6h-4V4h4v4z" />
              </svg>
            </button>
            <div style="display: flex; gap: 0rem; align-items: center;">
              <input type="number" id="upscaler-gridH" min="1" max="9" value="1" class="mpi-number-lite"
                style="width: 18px;" disabled>
              <span style="opacity: 0.4; font-size: 0.6rem;">/</span>
              <input type="number" id="upscaler-gridV" min="1" max="9" value="1" class="mpi-number-lite"
                style="width: 18px;" disabled>
            </div>
          </div>

          <!-- Creative Toggle -->
          <button id="upscaler-creativeToggle" class="btn secondary small icon-only" title="Toggle Creative Upscale"
            style="border-radius: 50%; width: 28px; height: 28px; padding: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05);">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path
                d="M12 3c-4.97 0-9 4.03-9 9 0 3.31 1.83 6.18 4.54 7.72.16.09.28.25.28.43.01.62.01 1.25.01 1.87 0 .54.45.98.99.98h6.35c.54 0 .99-.44.99-.98 0-.62 0-1.25.01-1.87 0-.17.11-.34.27-.43C19.17 18.18 21 15.31 21 12c0-4.97-4.03-9-9-9zm4.03 14h-8.06c-.46 0-.83-.37-.83-.83 0-.46.37-.83.83-.83h8.06c.46 0 .83.37.83.83s-.37.83-.83.83zm0-3h-8.06c-.46 0-.83-.37-.83-.83 0-.46.37-.83.83-.83h8.06c.46 0 .83.37.83.83s-.37.83-.83.83zm1.19-3.8c-.14.28-.41.48-.72.53-.29.04-.59-.03-.84-.18-.4-.25-.6-.7-.5-1.15.1-.44.5-.77.95-.77.34 0 .66.17.85.46.18.28.21.64.06.91v.2z" />
            </svg>
          </button>
        </div>

        <div style="display: flex; gap: 0.5rem; align-items: center;">

          <!-- Submit / Stop -->
          <button id="upscaler-upscaleBtn" class="btn primary small icon-only action-glow" title="Upscale (Ctrl+Enter)"
            style="border-radius: 50%; width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center;">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path
                d="M5 13h11.17l-4.88 4.88c-.39.39-.39 1.03 0 1.42.39.39 1.02.39 1.41 0l6.59-6.59a.996.996 0 0 0 0-1.41l-6.58-6.6a.996.996 0 1 0-1.41 1.41L16.17 11H5c-.55 0-1 .45-1 1s.45 1 1 1z" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</template>
