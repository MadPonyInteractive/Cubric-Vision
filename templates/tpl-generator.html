<template id="tpl-generator">
    <div class="tool-panel" id="tool-generator">
      <div class="tool-header" id="generator-header">
        <div class="tool-header-text">
          <h2 class="tool-title">Generator</h2>
          <p class="tool-desc">Generate your beautiful images -> Use (Ctrl + Enter) to generate instantly.</p>
        </div>
      </div>
      <div class="tool-body gen-flow-container" id="gen-flow">
        <!-- Generated batches / flow units injected here by JS -->
        <div id="gen-history" class="gen-flow-content"></div>

        <div id="gen-emptyState" class="gen-history-empty">
          <p>Your creative flow starts here.</p>
          <p style="font-size: 0.8rem; opacity: 0.6; margin-top: 0.5rem;">Enter a prompt below to begin.</p>
        </div>
      </div>
    </div>

    <!-- Floating Fixed Prompt Box -->
    <div id="genPromptGroup" class="gen-prompt-fixed">
      <div id="gen-thumbs" class="thumbnail-strip"></div>
      <div id="gen-prompt-wrapper" style="width: 100%;"></div>

      <!-- Progressive feedback overlay moved here -->
      <div class="comfy-progress-wrapper hide" id="gen-progressWrapper"
        style="margin: 0.25rem 0.5rem; height: 3px; border-radius: 4px;">
        <div class="comfy-progress-fill" id="gen-progressBar"></div>
      </div>

      <div class="prompt-box-actions-bar">
        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <div id="gen-prompt-toggle-container" style="margin-right: 0.25rem;"></div>

          <div style="width: 0.5rem;"></div>

          <div class="ratio-dropdown-container" style="position: relative;">
            <button id="gen-ratioToggleBtn" class="btn secondary small outline"
              style="border-radius: 16px; display: flex; align-items: center; gap: 0.5rem; padding: 4px 12px; font-size: 0.85rem;"
              title="Select Aspect Ratio">
              <svg id="gen-currentRatioIcon" viewBox="0 0 24 24" width="14" height="14" fill="none"
                stroke="currentColor" stroke-width="2">
                <rect x="4" y="4" width="16" height="16" rx="2" />
              </svg>
              <span id="gen-currentRatioText">1:1</span>
            </button>

            <!-- Aspect Ratio Pop-up Menu -->
            <div id="gen-ratioMenu" class="ratio-menu hide"
              style="position: absolute; bottom: calc(100% + 12px); left: 0; border: 1px solid var(--border-color); border-radius: 12px; padding: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1100; width: max-content;">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
                <span style="font-size: 0.8rem; color: var(--text-2); font-weight: 600;">RATIO</span>
                <button id="gen-ratioOrientationToggle" class="btn secondary small icon-only"
                  title="Toggle Orientation">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                    <path
                      d="M16 11L13 8v2H8v2h5v2l3-3zm4-7H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12z" />
                  </svg>
                </button>
              </div>
              <div id="gen-ratioGrid" style="display: flex; gap: 0.5rem; flex-wrap: nowrap;"></div>
            </div>
          </div>

          <div class="batch-selector-container" style="position: relative;">
            <button id="gen-batchToggleBtn" class="btn secondary small outline"
              style="border-radius: 16px; display: flex; align-items: center; gap: 0.4rem; padding: 4px 12px; font-size: 0.85rem;"
              title="Batch Size: Number of images to generate">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"
                style="opacity: 0.6; pointer-events: none;">
                <path d="M12 2L2 7l10 5 10-5-10-5-10-5zM2 17l10 5 10-5-10-5-10 5zM2 12l10 5 10-5-10-5-10 5z" />
              </svg>
              <span id="gen-batchCountText" style="font-weight: 800;">1</span>
            </button>
            <div id="gen-batchMenu" class="batch-menu hide">
              <div class="batch-option" data-value="1">1</div>
              <div class="batch-option" data-value="2">2</div>
              <div class="batch-option" data-value="3">3</div>
              <div class="batch-option" data-value="4">4</div>
            </div>
          </div>


        </div>

        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <div class="seed-control-group"
            style="border-right: 1px solid rgba(255,255,255,0.05); margin-right: 0.25rem;">
            <button id="gen-newSeedBtn" class="btn secondary small icon-only" title="Generate New Seed">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round">
                <path d="M9 3c0 4.5 6 4.5 6 9s-6 4.5-6 9" />
                <path d="M15 3c0 4.5-6 4.5-6 9s6 4.5 6 9" />
                <path d="M10 6h4" />
                <path d="M10 18h4" />
                <path d="M11 12h2" />
              </svg>
            </button>
            <input type="number" id="gen-seedInput" class="seed-input mpi-number-lite" placeholder="Random" step="1">
            <label class="icon-toggle-label" title="Automatic Seed Generation" data-tooltip="Automatic Seed Generation">
              <input type="checkbox" id="gen-autoSeed" checked>
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                <path d="M3 3v5h5" />
                <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
                <path d="M16 16h5v5" />
              </svg>
            </label>
          </div>

          <label class="icon-toggle-label" title="Toggle Refinement" data-tooltip="Toggle Refinement">
            <input type="checkbox" id="gen-useRefiner">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round">
              <path
                d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
              <path d="M5 3v4" />
              <path d="M3 5h4" />
              <path d="M21 17v4" />
              <path d="M19 19h4" />
            </svg>
          </label>

          <label class="icon-toggle-label" title="Toggle Turbo Mode" data-tooltip="Toggle Turbo Mode">
            <input type="checkbox" id="gen-useTurbo">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
            </svg>
          </label>

          <button id="gen-previewBtn" class="btn primary small icon-only action-glow" title="Generate"
            style="border-radius: 50%; width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center;">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path
                d="M5 13h11.17l-4.88 4.88c-.39.39-.39 1.03 0 1.42.39.39 1.02.39 1.41 0l6.59-6.59a.996.996 0 0 0 0-1.41l-6.58-6.6a.996.996 0 1 0-1.41 1.41L16.17 11H5c-.55 0-1 .45-1 1s.45 1 1 1z" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </template>
