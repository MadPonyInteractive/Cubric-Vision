<template id="tpl-llm">
    <div class="tool-panel" id="tool-llm">
      <div class="tool-header" id="llm-header">
        <div class="tool-header-text">
          <h2 class="tool-title">LLM Console</h2>
          <p class="tool-desc">Talk directly to any loaded LLM</p>
          <p class="tool-desc">Create presets to customize prefixes/suffixes for your prompts.</p>
        </div>
      </div>
      <div class="tool-body llm-layout">
        <div class="llm-chat-main">
          <!-- Presets Bar & Top Actions -->
          <div class="step-template-actions"
            style="margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; position: relative;">
            <select id="llm-templateSelector" class="template-select" title="Load a saved preset"
              style="flex: 0 1 auto; min-width: 150px;">
              <option value="">Load Preset...</option>
            </select>
            <button id="llm-editTemplateBtn" class="btn secondary small outline icon-only" title="Edit current preset"
              disabled>
              <svg viewBox="0 0 24 24" width="16" height="16">
                <path fill="currentColor"
                  d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" />
              </svg>
            </button>
            <button id="llm-deleteTemplateBtn" class="btn secondary small outline icon-only"
              title="Delete current preset" disabled>
              <svg viewBox="0 0 24 24" width="16" height="16">
                <path fill="currentColor"
                  d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14V4zM6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12z" />
              </svg>
            </button>
            <div class="template-sep"></div>
            <button id="llm-createTemplateBtn" class="btn secondary small">Create Preset</button>

            <!-- Top Right Icons -->
            <div class="llm-top-actions">
              <div id="llm-newChatBtn" class="llm-icon-btn" title="New Chat (+)">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                </svg>
              </div>
              <div id="llm-historyToggle" class="llm-icon-btn" title="Chat History">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path
                    d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z" />
                </svg>
              </div>
            </div>

            <!-- Floating History Popup -->
            <div id="llm-historyPopup" class="llm-history-popup hide">
              <div
                style="padding: 0.75rem; border-bottom: 1px solid var(--border-color); font-size: 0.75rem; font-weight: 800; letter-spacing: 0.05em; color: var(--text-3);">
                CHAT HISTORY
              </div>
              <div id="llm-historyList" class="llm-history-list">
                <!-- Populated by JS -->
              </div>
            </div>
          </div>

          <!-- Create Template Modal/Inline -->
          <div id="llm-createTemplateSection" class="form-grid hide"
            style="background:var(--bg-lighter); padding:1rem; border-radius:8px; margin-bottom:1rem;">
            <h3 id="llm-templateSectionTitle" style="margin-top:0; font-size:1rem;">Create New Preset</h3>
            <div class="form-group full-width">
              <label>Preset Title</label>
              <input type="text" id="llm-newTemplateName" placeholder="e.g. Visual Assistant, Prompt Engineer">
            </div>
            <div class="form-group full-width">
              <label>Prefix <span style="font-size:0.8em; color:var(--text-muted);">(Added BEFORE your
                  prompt)</span></label>
              <textarea id="llm-newTemplatePrefix" rows="2" placeholder="You are a prompt engineer..."></textarea>
            </div>
            <div class="form-group full-width">
              <label>Suffix <span style="font-size:0.8em; color:var(--text-muted);">(Added AFTER your
                  prompt)</span></label>
              <textarea id="llm-newTemplateSuffix" rows="2"
                placeholder="Critical: Output only the prompt..."></textarea>
            </div>
            <div class="step-actions" style="margin-top:0.5rem; justify-content:flex-end;">
              <button id="llm-cancelTemplateBtn" class="btn secondary small">Cancel</button>
              <button id="llm-saveTemplateBtn" class="btn primary small">Create</button>
            </div>
          </div>

          <!-- Chat Output / Area -->
          <div id="llm-chatContainer" class="chat-container result-edit-area"
            style="flex:1; overflow-y: auto; padding: 1.5rem; display:flex; flex-direction:column; gap:1.25rem; background: var(--bg-dark); border-radius: 12px; border: 1px solid var(--border-color);">
            <!-- Messages go here -->
            <div id="llm-emptyState"
              style="color:var(--text-muted); text-align:center; margin: auto; display: flex; flex-direction: column; align-items: center; gap: 1rem;">
              <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor" style="opacity: 0.2;">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" />
              </svg>
              <span>Start a new conversation with the local LLM.</span>
            </div>
          </div>

          <div id="llm-loading" class="loading-state hide">
            <div class="spinner"></div>
            <p id="llm-loadingText">Thinkingâ€¦</p>
          </div>
        </div>
      </div>

    </div>
    <!-- Floating Fixed Prompt Box -->
    <div id="llmPromptGroup" class="gen-prompt-fixed">
      <div id="llm-thumbs" class="thumbnail-strip"></div>
      <div id="llm-prompt-wrapper" style="width: 100%;"></div>

      <div class="prompt-box-actions-bar">
        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <button id="llm-addAssetBtn" class="btn secondary small icon-only" title="Add Media"
            style="border-radius: 50%; width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05);">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
            </svg>
          </button>
        </div>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <button id="llm-sendBtn" class="btn primary small icon-only action-glow" title="Send (Ctrl+Enter)"
            style="border-radius: 50%; width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center;">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path
                d="M5 13h11.17l-4.88 4.88c-.39.39-.39 1.03 0 1.42.39.39 1.02.39 1.41 0l6.59-6.59a.996.996 0 0 0 0-1.41l-6.58-6.6a.996.996 0 1 0-1.41 1.41L16.17 11H5c-.55 0-1 .45-1 1s.45 1 1 1z" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- LLM Delete Confirm Modal -->
    <div id="llm-confirmDeleteModal" class="modal-overlay hide" style="z-index: 1000;">
      <div class="modal-box modal-box--sm">
        <h2 class="modal-title">Delete Preset?</h2>
        <p class="modal-desc" id="llm-deleteConfirmText">Are you sure you want to delete this preset?</p>
        <div class="modal-footer">
          <button class="btn secondary" id="llm-cancelDeleteBtn">Cancel</button>
          <button class="btn danger" id="llm-confirmDeleteBtn">Delete</button>
        </div>
      </div>
    </div>
    </div>
  </template>
