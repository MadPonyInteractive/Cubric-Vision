<template id="tpl-compare">
    <div class="tool-panel" id="tool-compare">
      <div class="tool-header">
        <div class="tool-header-text">
          <h2 class="tool-title">Compare</h2>
          <p class="tool-desc">Compare two images side-by side using a swipe handle.</p>
        </div>
      </div>
      <div class="tool-body compare-layout">
        <div id="compare-leftInput-slot">
            <!-- MpiMediaDropzone (Left) will be mounted here -->
        </div>

        <div class="compare-canvas-pane">
          <div class="compare-canvas-container" id="compare-canvasContainer">
            <!-- InteractiveCanvas injected here -->
          </div>
        </div>

        <div id="compare-rightInput-slot">
            <!-- MpiMediaDropzone (Right) will be mounted here -->
        </div>
      </div>

    </div>
  </template>
