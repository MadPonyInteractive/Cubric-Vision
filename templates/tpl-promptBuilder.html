<template id="tpl-promptBuilder">
    <div class="tool-panel" id="tool-promptBuilder">
      <div class="tool-header">
        <div class="tool-header-text">
          <h2 class="tool-title">Prompt Builder</h2>
          <p class="tool-desc">Construct complex, structured prompts by stacking modular components.</p>
        </div>
      </div>

      <div class="tool-body pb-layout">
        <!-- Global Presets Box -->
        <div class="pb-global-presets">
          <div class="step-template-actions">
            <select id="pb-globalTemplateSelector" class="template-select" title="Load a global preset">
              <option value="">Load Preset...</option>
            </select>
            <button id="pb-globalDeleteTemplateBtn" class="btn secondary small outline icon-only"
              title="Delete current preset" disabled>
              <svg viewBox="0 0 24 24" width="16" height="16">
                <path fill="currentColor"
                  d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14V4zM6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12z" />
              </svg>
            </button>
            <div class="template-sep"></div>
            <button id="pb-globalSaveTemplateBtn" class="btn secondary small">Create Preset</button>
          </div>
        </div>

        <div class="pb-columns">
          <!-- Left Column: Tool Form -->
          <div class="pb-left-col">
            <div id="pb-toolEditorContainer" class="pb-tool-editor hide">
              <div class="pb-tool-presets">
                <select id="pb-toolTemplateSelector" class="template-select small" title="Load a tool-specific preset">
                  <option value="">Tool Preset...</option>
                </select>
                <button id="pb-toolDeleteTemplateBtn" class="btn secondary small outline icon-only"
                  title="Delete tool preset" disabled>
                  <svg viewBox="0 0 24 24" width="14" height="14">
                    <path fill="currentColor"
                      d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14V4zM6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12z" />
                  </svg>
                </button>
                <button id="pb-toolSaveTemplateBtn" class="btn secondary small outline"
                  style="margin-left:auto;">Save</button>
              </div>
              <div id="pb-dynamicForm" class="pb-form-content">
                <!-- Populated by JS -->
              </div>
            </div>
            <div id="pb-emptyFormState" class="pb-empty-state">
              <p>Select a tool from the dropdown below to begin building your prompt.</p>
            </div>
          </div>

          <!-- Right Column: Added Tools List -->
          <div class="pb-right-col">
            <div class="pb-list-header">
              <span>PROMPT LAYERS</span>
              <span class="field-hint">Drag to reorder</span>
            </div>
            <div id="pb-addedToolsList" class="pb-tools-list">
              <!-- Draggable items added here by JS -->
            </div>
            <div id="pb-listEmptyState" class="pb-list-empty">
              <p>No layers added yet.</p>
            </div>

          </div>
        </div>
      </div>

    </div>

    <!-- Floating Fixed Prompt Box -->
    <div id="pbPromptGroup" class="gen-prompt-fixed">
      <div id="pb-prompt-wrapper" style="width: 100%;"></div>

      <div class="prompt-box-actions-bar">
        <div class="pb-tool-selector-wrapper" style="position: relative;">
          <button id="pb-toolSelectBtn" class="btn secondary small outline"
            style="border-radius: 16px; padding: 4px 12px; font-size: 0.85rem; display:flex; align-items:center; gap:0.5rem;">
            <span>Add Tool...</span>
            <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor">
              <path d="M7 10l5 5 5-5H7z" />
            </svg>
          </button>

          <!-- Dropdown that appears ABOVE the button -->
          <div id="pb-toolMenu" class="pb-tool-menu hide">
            <div class="pb-menu-item" data-id="text_">Text</div>
            <div class="pb-menu-item" data-id="video_">Video Scenes</div>
            <div class="pb-menu-item" data-id="cam_">Camera</div>
            <div class="pb-menu-item" data-id="shot_">Shot</div>
            <div class="pb-menu-item" data-id="light_">Lighting</div>
            <div class="pb-menu-item" data-id="color_">Style</div>
          </div>
        </div>

        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <button id="pb-submitBtn" class="btn primary small icon-only action-glow"
            title="View Combined Prompt (Ctrl+Enter)"
            style="border-radius: 50%; width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center;">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path
                d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </template>
