<template id="tpl-translator">
  <div class="tool-panel" id="tool-translator">
    <div id="trans-firstVisitModal" class="modal-overlay hide">
      <div class="modal-box modal-box--sm">
        <h2 class="modal-title">🇨🇳 Why Chinese?</h2>
        <p class="modal-desc">Using Chinese can unlock more details in many diffusion models. Fitting more nuance in
          fewer tokens.</p>
        <div class="modal-footer">
          <button id="trans-dismissModal" class="btn primary">Got it!</button>
        </div>
      </div>
    </div>
    <div class="tool-header">
      <div class="tool-header-text">
        <h2 class="tool-title">Translator</h2>
        <p class="tool-desc">Translate your prompt into token-efficient Chinese.</p>
      </div>
    </div>
    <div class="tool-body gen-flow-container">
      <div id="trans-loading" class="loading-state hide">
        <div class="spinner"></div>
        <p>Translating...</p>
      </div>
      <div class="result-section hide" id="trans-result">
        <div class="form-group full-width">
          <div class="prompt-box-wrapper"
            style="position: relative; background: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 12px;">
            <textarea id="trans-output" class="result-edit-area" rows="6" readonly
              style="border: none; padding: 1rem; width: 100%; box-shadow: none;"></textarea>
            <div id="trans-copy-slot" style="position: absolute; top: 8px; right: 8px;"></div>
          </div>
        </div>
        <div id="trans-actions" class="step-actions" style="justify-content: flex-end;">
          <div id="trans-toGenerator-slot"></div>
        </div>
      </div>
    </div>

  </div>
  <!-- Floating Fixed Prompt Box Area -->
  <div id="transPromptGroup" class="gen-prompt-fixed">
    <div id="trans-prompt-wrapper" style="width: 100%;"></div>
  </div>
</template>
