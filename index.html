<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cubric Studio | AI Workflow Workstation</title>
  <meta name="description"
    content="Cubric Studio — a powerful local AI workstation for image generation, prompt engineering, and creative workflows.">
  <link rel="icon" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div id="titlebar" class="titlebar">
    <div class="titlebar-drag-region">
      <div class="titlebar-logo">
        <img src="favicon.png" alt="Cubric Studio Logo" class="titlebar-logo-img">
        <img src="lettering.png" alt="Cubric Studio" class="titlebar-text" style="height: 12px; margin-top: 2px;">
      </div>
    </div>
    <div class="window-controls">
      <button id="win-fullscreen" class="control-btn" title="Full Screen">
        <svg viewBox="0 0 24 24" width="14" height="14" id="fullscreen-enter-icon">
          <path fill="currentColor"
            d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
        </svg>
        <svg viewBox="0 0 24 24" width="14" height="14" id="fullscreen-exit-icon" class="hide">
          <path fill="currentColor" d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z" />
        </svg>
      </button>
      <button id="win-minimize" class="control-btn" title="Minimize">
        <svg viewBox="0 0 24 24" width="14" height="14">
          <path fill="currentColor" d="M19 13H5v-2h14v2z" />
        </svg>
      </button>
      <button id="win-maximize" class="control-btn" title="Maximize">
        <svg viewBox="0 0 24 24" width="14" height="14" id="max-icon">
          <path fill="currentColor" d="M4 4h16v16H4V4zm2 4v10h12V8H6z" />
        </svg>
        <svg viewBox="0 0 24 24" width="14" height="14" id="restore-icon" class="hide">
          <path fill="currentColor" d="M4 8h4V4h12v12h-4v4H4V8zm12-2H10v2h4v4h2V6zM6 12v6h6v-6H6z" />
        </svg>
      </button>
      <button id="win-close" class="control-btn close" title="Close">
        <svg viewBox="0 0 24 24" width="14" height="14">
          <path fill="currentColor"
            d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
        </svg>
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════════════
       LANDING PAGE
  ══════════════════════════════════════════════════════════════════════════════ -->
  <canvas id="shader-background" class="hide"></canvas>
  <div id="page-landing" class="page-landing">
    <div class="landing-header">
      <div class="landing-logo">
        <img src="favicon.png" alt="Cubric Studio Logo" class="logo-img">
        <img src="lettering.png" alt="Cubric Studio" class="landing-wordmark" style="height: 24px;">
      </div>
      <div id="landingActions" class="landing-actions"></div>
    </div>

    <div class="landing-hero">
      <h1 class="hero-title">Your Local AI <span class="gradient-text">Workstation</span></h1>
      <p class="hero-subtitle">Generate, enhance, and refine AI images and videos. <br> All running locally on your
        machine.</p>
      <div id="newProjectBtn"></div>
    </div>

    <div class="landing-recent">
      <div class="section-label">Recent Projects</div>
      <div id="projectGrid" class="project-grid">
        <!-- Populated by JS -->
        <div class="projects-loading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════════════
       APP SHELL (visible when a project is open)
  ══════════════════════════════════════════════════════════════════════════════ -->
  <div id="app-shell" class="app-shell hide">

    <!-- ── Main Area ─────────────────────────────────────────────────────────── -->
    <div class="main-area">

      <!-- Workspace Topbar — floats over the canvas via position:absolute -->
      <div id="workspace-topbar" class="workspace-topbar">
        <!-- MpiProjectName mounts here (top-left) -->
        <div id="project-name-mount"></div>
        <!-- MpiMemoryMonitor mounts here (top-right) -->
        <div id="memory-monitor-mount"></div>
      </div>

      <!-- Radial menu lives here — persists across tool/page switches -->
      <div id="radial-mount"></div>

      <main id="tool-container" class="tool-container">
        <!-- Tool panels injected here by the router -->
      </main>

      <!-- Shell-level PromptBox — mounted once, persists across workspace navigation -->
      <div id="prompt-box-mount"></div>

      <!-- Status Info Bar -->
      <footer id="shell-info-bar">
        <div class="shell-info__fill" id="shell-info-fill"></div>
        <div class="shell-info__left" id="shell-info-text">Ready</div>
        <div class="shell-info__right" id="shell-info-process"></div>
      </footer>
    </div>


  </div>


  <!-- ══════════════════════════════════════════════════════════════════════════
       SHARED MODALS
  ══════════════════════════════════════════════════════════════════════════════ -->


  <script type="importmap">
  {
    "imports": {
      "pixi.js": "/node_modules/pixi.js/dist/pixi.mjs"
    }
  }
  </script>
  <script type="module" src="js/init.js"></script>
</body>

</html>
