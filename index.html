<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cubric Vision | AI Workflow Workstation</title>
  <meta name="description"
    content="Cubric Vision — a powerful local AI workstation for image generation, prompt engineering, and creative workflows.">
  <link rel="icon" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div id="titlebar" class="titlebar">
    <div class="titlebar-drag-region">
      <div class="titlebar-logo">
        <img src="assets/mascot/logo.png" alt="Cubric Vision Logo" class="titlebar-logo-img">
        <span class="mpi-wordmark mpi-wordmark--titlebar" aria-label="Cubric Vision">Cubric<span class="mpi-wordmark__suffix">Vision</span></span>
      </div>
    </div>
    <div class="window-controls">
      <button id="win-fullscreen" class="control-btn" title="Full Screen">
        <svg viewBox="0 0 24 24" width="14" height="14" id="fullscreen-enter-icon">
          <path fill="currentColor"
            d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
        </svg>
        <svg viewBox="0 0 24 24" width="14" height="14" id="fullscreen-exit-icon" class="hide">
          <path fill="currentColor" d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z" />
        </svg>
      </button>
      <button id="win-minimize" class="control-btn" title="Minimize">
        <svg viewBox="0 0 24 24" width="14" height="14">
          <path fill="currentColor" d="M19 13H5v-2h14v2z" />
        </svg>
      </button>
      <button id="win-maximize" class="control-btn" title="Maximize">
        <svg viewBox="0 0 24 24" width="14" height="14" id="max-icon">
          <path fill="currentColor" d="M4 4h16v16H4V4zm2 4v10h12V8H6z" />
        </svg>
        <svg viewBox="0 0 24 24" width="14" height="14" id="restore-icon" class="hide">
          <path fill="currentColor" d="M4 8h4V4h12v12h-4v4H4V8zm12-2H10v2h4v4h2V6zM6 12v6h6v-6H6z" />
        </svg>
      </button>
      <button id="win-close" class="control-btn close" title="Close">
        <svg viewBox="0 0 24 24" width="14" height="14">
          <path fill="currentColor"
            d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
        </svg>
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════════════
       LANDING PAGE
  ══════════════════════════════════════════════════════════════════════════════ -->
  <div id="page-landing" class="mpi-landing">
    <div class="mpi-landing__stage">

      <!-- ── Hero (left 7fr) ──────────────────────────────────────────────── -->
      <section class="mpi-landing__hero">
        <div class="mpi-landing__hero-bg" aria-hidden="true"></div>
        <div class="mpi-landing__hero-grad" aria-hidden="true"></div>
        <div class="mpi-landing__hero-inner">

          <!-- top bar: version left, nav right -->
          <div class="mpi-landing__hero-top">
            <span class="mpi-landing__kicker" id="heroVersion">Cubric Vision</span>
            <nav class="mpi-landing__hero-nav" id="landingActions"></nav>
          </div>

          <!-- headline + CTA -->
          <div class="mpi-landing__headline">
            <span class="mpi-landing__kicker">your machine, your studio</span>
            <h1>Generate.<br>Refine.<br> <em>Own it.</em></h1>
            <p>A workstation for AI imagery and video that runs on your hardware. Models you choose. Files you keep. No quotas, no uploads, no surprises.</p>
            <div class="mpi-landing__cta">
              <div id="newProjectBtn"></div>
              <div id="openFolderHeroBtn"></div>
            </div>
          </div>

          <!-- bottom stats -->
          <div class="mpi-landing__hero-foot">
            <div class="mpi-landing__stat">
              <span id="heroStatEngine">local · offline</span>
              <span class="mpi-landing__stat-v" id="heroStatGpu">—</span>
            </div>
            <div class="mpi-landing__stat">
              <span>models</span>
              <span class="mpi-landing__stat-v" id="heroStatModels">—</span>
            </div>
            <div class="mpi-landing__stat">
              <span>last session</span>
              <span class="mpi-landing__stat-v" id="heroStatSession">—</span>
            </div>
          </div>

        </div>
      </section>

      <!-- ── Picker (right 5fr) ───────────────────────────────────────────── -->
      <aside class="mpi-landing__picker">
        <div class="mpi-landing__picker-head">
          <h2>Pick up where<br>you left off.</h2>
          <span class="mpi-landing__kicker" id="pickerCount"></span>
        </div>
        <div id="projectGrid" class="mpi-landing__picker-list">
          <!-- Populated by JS -->
          <div class="mpi-landing__loading"><div class="spinner"></div></div>
        </div>
        <div class="mpi-landing__picker-foot" id="openFolderBtn"></div>
      </aside>

    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════════════
       APP SHELL (visible when a project is open)
  ══════════════════════════════════════════════════════════════════════════════ -->
  <div id="app-shell" class="app-shell hide">

    <!-- ── Main Area ─────────────────────────────────────────────────────────── -->
    <div class="main-area">

      <!-- Workspace Topbar — floats over the canvas via position:absolute -->
      <div id="workspace-topbar" class="workspace-topbar">
        <!-- MpiProjectName mounts here (top-left) -->
        <div id="project-name-mount"></div>
      </div>

      <!-- Radial menu lives here — persists across tool/page switches -->
      <div id="radial-mount"></div>

      <main id="tool-container" class="tool-container">
        <!-- Tool panels injected here by the router -->
      </main>

      <!-- Shell-level PromptBox — mounted once, persists across workspace navigation -->
      <div id="prompt-box-mount"></div>

      <!-- Status Info Bar — global telemetry footer (Stage spec) -->
      <footer id="shell-info-bar">
        <div class="shell-info__fill" id="shell-info-fill"></div>
        <!-- Job state slot: idle badge OR active spinner+label+pct+time -->
        <div class="shell-info__job" id="shell-info-job">
          <span class="shell-info__job-dot"></span>
          <span class="shell-info__job-label" id="shell-info-job-label">IDLE</span>
          <span class="shell-info__job-pct" id="shell-info-job-pct"></span>
          <span class="shell-info__job-time" id="shell-info-job-time"></span>
        </div>
        <!-- MpiMemoryMonitor mounts here (status bar right slot) -->
        <div id="memory-monitor-mount"></div>
      </footer>
    </div>


  </div>


  <!-- ══════════════════════════════════════════════════════════════════════════
       SHARED MODALS
  ══════════════════════════════════════════════════════════════════════════════ -->


  <script type="module" src="js/init.js"></script>
</body>

</html>
