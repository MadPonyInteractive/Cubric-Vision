<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPI — Modern Minimalist UI</title>
    <style>
        /* ═══════════════════════════════════════════════════════════════
           MPI Component Gallery — Modern Mockup
           Blue + Pink + Accent palette with glassmorphic design
        ═══════════════════════════════════════════════════════════════ */

        :root {
            /* Color Palette — Blue + Pink accent (for when needed) */
            --primary: #55b3f1;           /* Cyan Blue */
            --primary-dim: #4a9fd4;       /* Darker Blue */
            --accent: #d17ddb;            /* Pink (subtle accent only) */

            /* Dark Background (middle ground — not too dark) */
            --bg-dark: #3c2d38;
            --bg-elevated: #2a1f25;

            /* Muted Control Colors */
            --btn-muted: rgba(255, 255, 255, 0.08);
            --btn-muted-hover: rgba(255, 255, 255, 0.12);
            --btn-border: rgba(255, 255, 255, 0.08);

            /* Text */
            --text-primary: #f8f8f2;
            --text-secondary: #9a9a9a;
            --text-tertiary: #5a5a5a;

            /* Borders */
            --border-light: rgba(255, 255, 255, 0.08);
            --border-lighter: rgba(255, 255, 255, 0.03);

            /* Typography — Premium Modern Fonts */
            --font-main: 'Space Grotesk', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-display: 'Sohne', 'Helvetica Neue', sans-serif;

            /* Spacing */
            --radius-sm: 3px;
            --radius: 4px;

            --transition: 0.15s ease-out;
        }

        /* Font imports for modern typography */
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            background:
                radial-gradient(ellipse at 50% -20%, rgba(182, 120, 255, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 15% 50%, rgba(77, 238, 234, 0.04) 0%, transparent 40%),
                var(--bg-dark);
            background-color: var(--bg-dark);
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: var(--font-main);
            line-height: 1.6;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ─── Top Status Bar ─────────────────────────────────────── */
        .status-bar-top {
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--border-lighter);
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .status-item-top {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-meter {
            width: 60px;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
        }

        .status-meter-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 2px;
        }

        /* ─── Header — Ultra Minimal ─────────────────────────────────────── */
        .header {
            background: rgba(0, 0, 0, 0.15);
            border-bottom: 1px solid var(--border-lighter);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .header-branding {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .header-title {
            font-size: 0.9rem;
            font-weight: 600;
            font-family: var(--font-display);
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .header-subtitle {
            font-size: 0.65rem;
            font-weight: 400;
            color: var(--text-tertiary);
            letter-spacing: 0.02em;
        }

        .header-controls {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .icon-btn {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 3px;
            background: var(--btn-muted);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            font-size: 0.65rem;
        }

        .icon-btn:hover {
            background: var(--btn-muted-hover);
            color: var(--text-primary);
        }

        /* ─── Main Container — Prompt-Box Centered ──────────────────────────────────────────────── */
        .main {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        /* ─── Center Content ─────────────────────────────────────────────────────── */
        .center-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            min-height: 0;
        }

        /* ─── Gallery Background (hidden for mockup) ─────────────────────────────────────────────────────── */
        .sidebar {
            display: none;
        }

        .sidebar-section {
            margin-bottom: 12px;
            padding: 0 6px;
        }

        .sidebar-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-tertiary);
            padding: 0 8px 4px 8px;
        }

        .sidebar-item {
            padding: 5px 8px;
            border-radius: var(--radius);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
            border-left: 2px solid transparent;
            font-size: 0.75rem;
        }

        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border-left-color: var(--primary);
        }

        .sidebar-item.active {
            background: rgba(85, 179, 241, 0.1);
            color: var(--primary);
            border-left-color: var(--primary);
        }

        /* ─── Prompt Box — Centered ────────────────────────────────────────────────── */
        .prompt-box {
            width: 100%;
            max-width: 720px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .prompt-textarea {
            width: 100%;
            min-height: 120px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-lighter);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 0.9rem;
            resize: none;
            transition: all var(--transition);
        }

        .prompt-textarea:focus {
            outline: none;
            border-color: var(--border-light);
            background: rgba(0, 0, 0, 0.3);
        }

        .prompt-textarea::placeholder {
            color: var(--text-tertiary);
        }

        /* ─── Prompt Controls ─────────────────────────────────────────────────── */
        .prompt-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .model-selector {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-lighter);
            border-radius: 6px;
            padding: 6px 10px;
            color: var(--text-secondary);
            font-family: var(--font-main);
            font-size: 0.8rem;
            cursor: pointer;
        }

        .generate-btn {
            margin-left: auto;
            padding: 8px 20px;
            background: var(--primary);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all var(--transition);
        }

        .generate-btn:hover {
            background: var(--primary-dim);
            opacity: 0.95;
        }

        .model-selector {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-lighter);
            border-radius: 6px;
            padding: 6px 10px;
            color: var(--text-secondary);
            font-family: var(--font-main);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all var(--transition);
        }

        .model-selector:hover {
            border-color: var(--border-light);
            color: var(--text-primary);
        }

        /* ─── Bottom Control Bar ─────────────────────────────────────────────────── */
        .bottom-bar {
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--border-lighter);
            padding: 8px 12px;
            display: flex;
            gap: 4px;
            align-items: center;
            flex-shrink: 0;
        }

        .control-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 4px;
            background: var(--btn-muted);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            transition: all var(--transition);
            position: relative;
        }

        .control-btn:hover {
            background: var(--btn-muted-hover);
            color: var(--text-primary);
        }

        /* Tooltip on hover for control buttons */
        .control-btn::after {
            content: attr(title);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
            margin-bottom: 4px;
        }

        .control-btn:hover::after {
            opacity: 1;
        }

        /* ─── Component Section — COMPACT ───────────────────────────────────────────── */
        .comp-section {
            margin-bottom: 12px;
        }

        .comp-section-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-light);
        }

        .comp-section-header::before {
            content: '';
            width: 2px;
            height: 14px;
            background: var(--accent-pink);
            border-radius: var(--radius-sm);
        }

        .comp-section-title {
            font-size: 0.8rem;
            font-weight: 600;
            margin: 0;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .comp-section-count {
            margin-left: auto;
            font-size: 0.65rem;
            color: var(--text-tertiary);
            background: rgba(255, 255, 255, 0.03);
            padding: 2px 6px;
            border-radius: var(--radius);
        }

        /* ─── Component Grid ──────────────────────────────────────────────── */
        .comp-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .comp-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 160px;
            cursor: pointer;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }

        .comp-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(85, 179, 241, 0.1) 0%, rgba(209, 125, 219, 0.05) 100%);
            opacity: 0;
            transition: opacity var(--transition);
        }

        .comp-card:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.04) 100%);
            border-color: var(--primary);
            box-shadow: 0 8px 32px rgba(85, 179, 241, 0.15), inset 0 0 20px rgba(85, 179, 241, 0.05);
            transform: translateY(-4px);
        }

        .comp-card:hover::before {
            opacity: 1;
        }

        .comp-icon {
            font-size: 36px;
            margin-bottom: 12px;
            opacity: 0.9;
            transition: all var(--transition);
        }

        .comp-card:hover .comp-icon {
            transform: scale(1.1) rotate(2deg);
            opacity: 1;
        }

        .comp-name {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 4px;
        }

        .comp-type {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Badges and featured cards removed — now inline compact design */

        /* Stats now integrated in content */

        /* ─── Scrollbar ───────────────────────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            border: 2px solid var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(85, 179, 241, 0.3);
        }

        /* ─── Responsive ──────────────────────────────────────────────────── */
        @media (max-width: 1400px) {
            .comp-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
        }

        @media (max-width: 1024px) {
            .main {
                flex-direction: column;
                height: auto;
            }

            .sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--border-light);
                display: flex;
                overflow-x: auto;
                padding: 12px 24px;
            }

            .sidebar-section {
                margin-bottom: 0;
                margin-right: 24px;
                white-space: nowrap;
            }

            .featured-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 12px;
                padding: 12px 16px;
            }

            .header-left {
                width: 100%;
            }

            .header-title {
                display: none;
            }

            .header-controls {
                width: 100%;
            }

            .search-input {
                width: 100%;
            }

            .content {
                padding: 20px;
            }

            .content-title {
                font-size: 1.5rem;
            }

            .comp-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 12px;
            }

            .comp-card {
                min-height: 130px;
            }

            .featured-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Status Bar — Top Right (Shows Generation Progress & System Stats) -->
    <div class="status-bar-top">
        <div class="status-item-top" title="Generation Progress">
            <span>Generating</span>
            <div class="status-meter">
                <div class="status-meter-fill" style="width: 0%;"></div>
            </div>
            <span>0%</span>
        </div>

        <div class="status-item-top" title="VRAM Usage">
            <span>VRAM</span>
            <div class="status-meter">
                <div class="status-meter-fill" style="width: 45%;"></div>
            </div>
        </div>

        <div class="status-item-top" title="System RAM Usage">
            <span>RAM</span>
            <div class="status-meter">
                <div class="status-meter-fill" style="width: 62%;"></div>
            </div>
        </div>
    </div>

    <!-- Header — Ultra Minimal with Logo -->
    <div class="header">
        <div class="header-left">
            <!-- Logo Placeholder (user's actual logo would replace this) -->
            <div style="width: 32px; height: 32px; background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700;">⬜</div>
            <div class="header-branding">
                <div class="header-title">Cubric Studio</div>
                <div class="header-subtitle">Generator</div>
            </div>
        </div>
        <div class="header-controls">
            <button class="icon-btn" title="Settings">⚙</button>
            <button class="icon-btn" title="Help">?</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main">
        <!-- Center Prompt Box -->
        <div class="center-area">
            <div class="prompt-box">
                <textarea class="prompt-textarea" placeholder="Type your prompt here... Images will appear above when dropped."></textarea>

                <div class="prompt-controls">
                    <select class="model-selector">
                        <option>SDXL Realistic</option>
                        <option>Flux Pro</option>
                        <option>SD3</option>
                    </select>
                    <button class="generate-btn">▶ Generate</button>
                </div>
            </div>
        </div>

        <!-- Bottom Control Bar — Icon Buttons with Hover Tooltips -->
        <div class="bottom-bar">
            <button class="control-btn" title="Settings">⚙</button>
            <button class="control-btn" title="History">🕐</button>
            <button class="control-btn" title="Favorites">★</button>
            <button class="control-btn" title="Compare">◯</button>
        </div>

    </div>
</body>
</html>
